<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Master - Popular Music</title>

<style>
:root { 
    --lavender-light: #F3E5F5; 
    --purple-pale: #E1BEE7; 
    --purple-main: #9575CD; 
    --purple-dark: #673AB7;
    --pink-soft: #FFF0F6;
}
body { font-family: 'Pretendard', sans-serif; margin: 0; background: #F8F7FA; display: flex; justify-content: center; }
.phone-container { width: 100%; max-width: 450px; background: white; display: flex; flex-direction: column; }
.header { padding: 12px; text-align: center; font-weight: bold; color: var(--purple-dark); border-bottom: 1px solid #eee; }
#display-area { flex: 1; padding: 20px; }

.hidden { display: none !important; }

.btn-intro-step { background: var(--purple-main); color: white; padding: 16px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }

.main-title-card { background: linear-gradient(135deg, #B39DDB, #9575CD); padding: 30px; border-radius: 20px; color: white; text-align: center; margin-bottom: 20px; }

.sentence-box { background: var(--lavender-light); padding: 20px; border-radius: 20px; font-weight: bold; color: var(--purple-dark); margin-bottom: 15px; text-align: center; }
.kor-box { background: #FFF5F7; padding: 20px; border-radius: 20px; font-weight: bold; color: #D81B60; margin-bottom: 15px; text-align: center; }

.voca-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.voca-item { background: white; padding: 10px; border-radius: 10px; border: 1px solid var(--purple-pale); text-align: center; cursor: pointer; }

.voca-item.revealed { background: var(--purple-main); color: white; }

.blank-area { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 15px; }
.word-blank { border-bottom: 2px solid var(--purple-main); cursor: pointer; color: transparent; }
.word-blank.revealed { color: var(--purple-dark); font-weight: bold; border: none; }

.btn-check { margin-top: 10px; padding: 10px; width: 100%; border-radius: 10px; border: none; cursor: pointer; }

.trans-content { display: none; margin-top: 10px; }

.nav-btns-fixed { display: flex; gap: 10px; padding: 10px; border-top: 1px solid #eee; }
.btn-prev, .btn-next { flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; }
.btn-next { background: var(--purple-main); color: white; }
</style>
</head>

<body>

<div class="phone-container">
<div class="header" id="header-title">English Master</div>
<div id="display-area"></div>

<div id="nav-area" class="nav-btns-fixed hidden">
<button class="btn-prev" onclick="prevSentence()">PREV</button>
<button class="btn-next" onclick="nextSentence()" id="main-next-btn">NEXT</button>
</div>
</div>

<script>

const prepositions = ["in","on","at","to","for","with","by","from","of","through","after"];

const fullData = [

{
en: "The explosion of popular music in the second half of the twentieth century as well as the global circulation and dissemination of music by the creative industries propelled a new understanding of accessibility in relation to music.",
ko: "창작 산업계의 전 세계적 음악 유통과 보급뿐만 아니라 20세기 후반의 대중음악의 폭발적 증가는 음악과 관련된 접근성에 대한 새로운 이해를 촉진했다.",
voca: ["explosion:폭발","circulation:유통","dissemination:보급","propelled:촉진했다","accessibility:접근성","creative industries:창작 산업","relation:관련","global:전 세계적","understanding:이해","🍎"]
},

{
en: "Suddenly, in the 1950s, anyone could pick up spoons, a couple of pans, a second-hand guitar and start a band.",
ko: "갑자기, 1950년대에, 누구나 숟가락, 냄비 몇 개, 중고 기타를 집어 들고 밴드를 시작할 수 있었다.",
voca: ["pick up:집어 들다","a couple of:몇 개의","second-hand:중고의","start:시작하다","band:밴드","anyone:누구나","suddenly:갑자기","guitar:기타","pans:냄비","🍎"]
},

{
en: "This led to specific genres such as skiffle, but also, more generally, reflected a much more relaxed and inclusive attitude to music making.",
ko: "이는 스키플과 같은 특정 장르로 이어졌을 뿐만 아니라, 더 일반적으로는 음악 제작에 대한 훨씬 더 여유롭고 포용적인 태도를 반영했다.",
voca: ["genre:장르","skiffle:스키플","reflected:반영했다","inclusive:포용적인","attitude:태도","relaxed:여유로운","generally:일반적으로","music making:음악 제작","specific:특정한","🍎"]
},

{
en: "While ordinary people had always sung and made music, the popular music movement was driven by a spirit of rebellion and freedom.",
ko: "평범한 사람들이 항상 노래를 부르고 음악을 만들어 왔었지만, 대중음악 운동은 저항과 자유의 정신에 의해 촉진되었다.",
voca: ["ordinary:평범한","movement:운동","driven:이끌린","rebellion:저항","freedom:자유","spirit:정신","while:~이지만","always:항상","made music:음악을 만들다","🍎"]
},

{
en: "This approach led to the punk movement, whose musicians even made it a condition for their music to be non-virtuosic and accessible to all in the 1970s.",
ko: "이러한 접근 방식은 펑크 운동으로 이어졌으며, 1970년대에 이 음악가들은 자신들의 음악이 전문성이 높지 않고 누구나 접근할 수 있는 것을 조건으로 삼았다.",
voca: ["approach:접근","punk:펑크","condition:조건","non-virtuosic:비전문적인","accessible:접근 가능한","musicians:음악가들","even:심지어","movement:운동","1970s:1970년대","🍎"]
},

{
en: "Groups who had been entirely excluded from music revelled in opportunities to create.",
ko: "음악에서 완전히 배제되었던 집단들이 창작의 기회를 만끽했다.",
voca: ["excluded:배제된","revelled:만끽했다","opportunity:기회","create:창작하다","entirely:완전히","group:집단","music:음악","who:~하는","had been:~되어왔다","🍎"]
},

{
en: "This led to a sense of novelty and empowerment in and beyond the music sphere.",
ko: "이는 음악계 안팎에서 참신성과 자율성이라는 인식으로 이어졌다.",
voca: ["novelty:참신성","empowerment:자율성","sphere:영역","beyond:넘어서","sense:감각","led to:이어졌다","music:음악","in and beyond:안팎에서","this:이것","🍎"]
}

];

let currentMode = 'INTRO';
let currentIdx = 0;

function render() {
const area = document.getElementById('display-area');
const nav = document.getElementById('nav-area');
const header = document.getElementById('header-title');

area.innerHTML = '';

<!-- INTRO 부분만 교체하면 됨 -->

if (currentMode === 'INTRO') {
    header.innerText = "English Master";
    nav.classList.add('hidden');

    area.innerHTML = `
        <div class="main-title-card">
            <h1>Popular Music<br>Accessibility</h1>
            <p>대중음악과 접근성</p>
        </div>

        <div class="intro-summary">
            <p>• <b>📍 서론:</b> 대중음악의 확산과 창작 산업의 발전은 음악 접근성에 대한 새로운 인식을 형성함.</p>
            <p>• <b>📍 본론:</b> 누구나 악기를 들고 음악을 만들 수 있게 되면서 포용적이고 자유로운 음악 문화가 형성되고, 펑크 운동으로 이어짐.</p>
            <p>• <b>📍 결론:</b> 소외된 집단까지 창작에 참여하게 되며 음악 안팎에서 자율성과 새로운 가능성이 확대됨.</p>
        </div>

        <div class="intro-topic">
            <span class="topic-kor">
            주제: 대중음악의 확산이 누구나 참여 가능한 음악 환경을 만들고 창의성과 자율성을 확장시킨 과정
            </span>
            <span class="topic-eng">
            Topic: The expansion of popular music creating accessible, inclusive, and empowering musical participation
            </span>
        </div>

        <button class="btn-intro-step" onclick="startStep(2)">
            STEP 2: 문장 학습 시작 ▶
        </button>

        <button class="btn-intro-step" style="background:#9C27B0;" onclick="startStep(3)">
            STEP 3: 영작 연습 시작 ▶
        </button>
    `;
}

 else {
nav.classList.remove('hidden');

const item = fullData[currentIdx];

if (currentMode === 'STEP2') {
area.innerHTML = `
<div class="sentence-box">${item.en}</div>
<div class="voca-grid" id="voca-area"></div>
<button class="btn-check" onclick="toggleView()">해석 확인</button>
<div class="trans-content" id="trans">${item.ko}</div>
`;
fillVoca(item.voca);
} else {
area.innerHTML = `
<div class="kor-box">${item.ko}</div>
<div class="blank-area" id="blank-area"></div>
<div class="voca-grid" id="voca-area"></div>
<button class="btn-check" onclick="toggleView()">정답 확인</button>
<div class="trans-content" id="trans">${item.en}</div>
`;
fillBlanks(item.en);
fillVoca(item.voca);
}
}
}

function fillVoca(list) {
const area = document.getElementById('voca-area');
list.forEach(v => {
const div = document.createElement('div');
div.className = 'voca-item';
if (v.includes(":")) {
let [en, ko] = v.split(":");
div.innerText = en;
div.onclick = () => {
div.classList.toggle('revealed');
div.innerText = div.classList.contains('revealed') ? ko : en;
};
} else {
div.innerText = v;
}
area.appendChild(div);
});
}

function fillBlanks(s) {
const area = document.getElementById('blank-area');
s.split(' ').forEach(w => {
const span = document.createElement('span');
if (prepositions.includes(w.toLowerCase())) {
span.innerText = w;
} else {
span.className = 'word-blank';
span.innerText = w;
span.onclick = () => span.classList.add('revealed');
}
area.appendChild(span);
});
}

function toggleView() {
const t = document.getElementById('trans');
t.style.display = t.style.display === 'block' ? 'none' : 'block';
}

function startStep(n) {
currentMode = 'STEP' + n;
currentIdx = 0;
render();
}

function nextSentence() {
if (currentIdx < fullData.length - 1) {
currentIdx++;
render();
}
}

function prevSentence() {
if (currentIdx > 0) {
currentIdx--;
render();
}
}

window.onload = render;

</script>

</body>
</html>
