<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>English Master #22 - 26년 3월 고1</title>
    <style>
        :root { 
            --pink-light: #FFF0F6; 
            --pink-pale: #FFDEEB; 
            --pink-main: #F06595; 
            --pink-dark: #C2255C;
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: #FDF2F5; display: flex; justify-content: center; min-height: 100vh; }
        .phone-container { width: 100%; max-width: 450px; background: white; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .header { padding: 12px; text-align: center; font-weight: bold; color: var(--pink-dark); border-bottom: 1px solid #eee; background: white; font-size: 0.95rem; position: sticky; top: 0; z-index: 10; }
        #display-area { flex: 1; padding: 20px; display: flex; flex-direction: column; }
        
        .hidden { display: none !important; }
        .btn-next { background: var(--pink-main); color: white; padding: 16px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
        .btn-prev { background: #EDF2F7; color: #718096; padding: 16px; border-radius: 15px; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; width: 30%; margin-right: 10px; }

        /* STEP 1: 인트로 */
        .main-title-card { width: 100%; background: linear-gradient(135deg, #FFDEEB 0%, #F06595 100%); padding: 35px 20px; border-radius: 20px; color: white; margin-bottom: 20px; box-sizing: border-box; text-align: center; }
        .intro-summary { background: var(--pink-light); padding: 18px; border-radius: 15px; margin-bottom: 15px; border: 2px solid var(--pink-pale); font-size: 0.92rem; line-height: 1.6; }
        .intro-topic { background: #FFF9DB; padding: 18px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #FFE066; text-align: center; }
        .topic-kor { font-weight: bold; color: #E67700; display: block; margin-bottom: 5px; }
        .topic-eng { font-size: 0.85rem; color: #888; font-style: italic; }

        .sentence-box { background: var(--pink-light); padding: 20px; border-radius: 20px; font-size: 1.1rem; font-weight: 700; color: var(--pink-dark); margin-bottom: 15px; border: 2px solid var(--pink-pale); text-align: center; cursor: pointer; line-height: 1.5; }
        .kor-box { background: #F8F9FA; padding: 20px; border-radius: 20px; font-size: 0.95rem; font-weight: 600; color: #495057; margin-bottom: 15px; border: 2px solid #DEE2E6; text-align: center; line-height: 1.6; }
        
        .voca-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .voca-item { background: #fff; padding: 10px; border-radius: 10px; font-size: 0.82rem; border: 1px solid var(--pink-pale); cursor: pointer; text-align: center; font-weight: 600; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .voca-item.revealed { background: var(--pink-main); color: white; }
        
        .blank-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-bottom: 20px; padding: 10px; background: #fdfdfd; border-radius: 15px; }
        .word-blank { border-bottom: 2px solid var(--pink-main); min-width: 35px; text-align: center; font-size: 1rem; color: transparent; cursor: pointer; padding: 0 2px; }
        .word-blank.revealed { color: var(--pink-dark); border-bottom-color: transparent; font-weight: bold; }

        .btn-check { background: #f0f0f0; padding: 12px; border-radius: 12px; border: none; font-weight: bold; margin-bottom: 10px; cursor: pointer; width: 100%; font-size: 0.9rem; }
        .trans-content { display: none; padding: 15px; background: #fafafa; border-radius: 15px; border-left: 5px solid var(--pink-main); font-size: 0.9rem; margin-bottom: 10px; }
        
        .nav-btns-fixed { display: flex; justify-content: center; align-items: center; padding: 15px; background: white; border-top: 1px solid #eee; margin-top: auto; position: sticky; bottom: 0; gap: 10px; }
        .step-num-btn { width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--pink-pale); background: white; color: var(--pink-main); font-weight: bold; cursor: pointer; }
        .step-num-btn.active { background: var(--pink-main); color: white; border-color: var(--pink-main); }
    </style>
</head>
<body>
<div class="phone-container">
    <div class="header" id="header-title">English Master #22</div>
    <div id="display-area"></div>
    <div id="nav-area" class="nav-btns-fixed hidden">
        <button class="step-num-btn" id="num-1" onclick="jumpTo(0)">1</button>
        <button class="step-num-btn" id="num-2" onclick="jumpTo(1)">2</button>
        <button class="step-num-btn" id="num-3" onclick="jumpTo(2)">3</button>
        <button class="step-num-btn" id="num-4" onclick="jumpTo(3)">4</button>
        <button class="step-num-btn" id="num-5" onclick="jumpTo(4)">5</button>
    </div>
</div>

<script>
    const prepositions = ["in", "on", "at", "by", "with", "for", "to", "from", "of", "about", "as", "into", "through", "after", "before", "under", "throughout"];
    const fullData = [
        { en: "Despite learned eating behaviors and inborn biological differences, taste preferences can be changed throughout our lives due to neuroplasticity.", ko: "학습된 식습관과 선천적인 생물학적 차이에도 불구하고, 신경가소성 덕분에 입맛 선호도는 평생에 걸쳐 바뀔 수 있습니다.", voca: ["Despite:~에도 불구하고", "learned:학습된", "behaviors:행동/습관", "inborn:선천적인", "biological:생물학적인", "preferences:선호도", "changed:바뀐", "throughout:~ 내내", "neuroplasticity:신경가소성", "lives:삶/인생"] },
        { en: "There is far more flexibility in our food behaviors than most think, even as we age.", ko: "우리가 나이가 들어감에 따라, 대부분의 사람들이 생각하는 것보다 우리의 음식 습관에는 훨씬 더 많은 유연성이 있습니다.", voca: ["flexibility:유연성", "age:나이가 들다", "think:생각하다", "behaviors:습관", "far more:훨씬 더 많은", "food:음식", "even:~조차/심지어", "🍎", "🍎", "🍎"] },
        { en: "This is terrific news for adventurous eaters, but it’s amazing news for those eager to break poor diet habits.", ko: "이것은 모험적인 식가들에게는 아주 좋은 소식이지만, 좋지 않은 식습관을 깨고 싶어 하는 사람들에게는 놀라운 소식입니다.", voca: ["terrific:아주 좋은", "adventurous:모험적인", "eaters:먹는 사람/식가", "eager:열렬히 원하는", "break:깨다", "habits:습관", "poor:나쁜/열악한", "diet:식단/식사", "🍎", "🍎"] },
        { en: "Just as kids gradually learn to like nutritious foods, so, too, can adults readjust their taste.", ko: "아이들이 점진적으로 영양가 있는 음식을 좋아하게 되는 것처럼, 성인들도 그들의 입맛을 재조정할 수 있습니다.", voca: ["gradually:점진적으로", "nutritious:영양가 있는", "readjust:재조정하다", "taste:입맛", "adults:성인들", "learn:배우다", "🍎", "🍎", "🍎", "🍎"] },
        { en: "Repeated exposure — and a willingness to change — is the key to expanding your menu.", ko: "반복적인 노출, 그리고 변화하려는 의지가 여러분의 메뉴를 확장하는 핵심입니다.", voca: ["Repeated:반복적인", "exposure:노출", "willingness:기꺼이 하려는 마음/의지", "key:열쇠/핵심", "expanding:확장하는", "change:변화", "menu:메뉴", "🍎", "🍎", "🍎"] }
    ];

    let currentMode = 'INTRO';
    let currentIdx = 0;
    const synth = window.speechSynthesis;

    function render() {
        const area = document.getElementById('display-area');
        const nav = document.getElementById('nav-area');
        const header = document.getElementById('header-title');
        area.innerHTML = '';

        if (currentMode === 'INTRO') {
            header.innerText = "English Master #22";
            nav.classList.add('hidden');
            area.innerHTML = `
                <div class="main-title-card"><h1>Neuroplasticity<br>& Taste</h1><p>2026년 3월 고1 모의고사 22번</p></div>
                
                <div class="intro-summary">
                    <p>• <b>📍 서론:</b> 식습관은 어린 시절에 형성되거나 타고나기도 하지만, 뇌의 적응 능력인 '신경가소성' 덕분에 평생 바뀔 수 있음.</p>
                    <p>• <b>📍 본론:</b> 성인이 되어서도 식습관에는 생각보다 큰 유연성이 있으며, 아이들이 편식을 고치듯 성인도 건강한 입맛으로 재조정 가능함.</p>
                    <p>• <b>📍 결론:</b> 흰 빵 대신 통곡물을 선호하게 되는 것처럼, '반복적인 노출'과 '변화하려는 의지'가 있다면 입맛은 반드시 바뀜.</p>
                </div>
                <div class="intro-topic">
                    <span class="topic-kor">주제: 뇌의 신경가소성을 통한 식습관 및 입맛 변화의 가능성</span>
                    <span class="topic-eng">Topic: The possibility of changing taste preferences and eating habits through neuroplasticity</span>
                </div>
                <button class="btn-next" onclick="startStep(2)">STEP 2: 문장 학습 시작 ▶</button>
                <button class="btn-next" style="margin-top:10px; background:#F06595;" onclick="startStep(3)">STEP 3: 영작 연습 시작 ▶</button>
            `;
        } else {
            const stepNum = currentMode === 'STEP2' ? 2 : 3;
            header.innerText = `STEP ${stepNum}. ${stepNum === 2 ? '문장 학습' : '영작 연습'} (${currentIdx + 1}/5)`;
            nav.classList.remove('hidden');
            updateNavBtns();
            
            const item = fullData[currentIdx];
            if (currentMode === 'STEP2') {
                area.innerHTML = `
                    <div class="sentence-box" onclick="playTTS('${item.en.replace(/'/g, "\\'")}')">${item.en}</div>
                    <div class="voca-grid" id="voca-area"></div>
                    <button class="btn-check" onclick="toggleView('trans-area')">해석 확인하기</button>
                    <div id="trans-area" class="trans-content">${item.ko}</div>
                `;
                fillVoca(item.voca, '🍎', "#FF3B30");
            } else {
                area.innerHTML = `
                    <div class="kor-box">${item.ko}</div>
                    <div class="blank-area" id="blank-area"></div>
                    <div class="voca-grid" id="voca-area"></div>
                    <button class="btn-check" onclick="toggleView('trans-area')">정답 확인하기</button>
                    <div id="trans-area" class="trans-content">${item.en}</div>
                `;
                fillBlanks(item.en);
                fillVoca(item.voca, '🍇', "#F06595");
            }
        }
    }

    function fillVoca(vocaList, emoji, color) {
        const container = document.getElementById('voca-area');
        vocaList.forEach(v => {
            const div = document.createElement('div');
            div.className = 'voca-item';
            if (v.includes(':')) {
                const [en, ko] = v.split(':');
                div.innerText = en;
                div.onclick = function() { this.classList.toggle('revealed'); this.innerText = this.classList.contains('revealed') ? ko : en; };
            } else {
                div.innerText = emoji; div.style.color = color; div.style.cursor = "default";
            }
            container.appendChild(div);
        });
    }

    function fillBlanks(sentence) {
        const container = document.getElementById('blank-area');
        container.innerHTML = '';
        sentence.split(' ').forEach(word => {
            const span = document.createElement('span');
            const cleanWord = word.replace(/[.,'"]/g, "").toLowerCase();
            if (prepositions.includes(cleanWord)) {
                span.style.margin = "0 4px";
                span.style.color = "#495057";
                span.style.fontWeight = "bold";
                span.innerText = word;
            } else {
                span.className = 'word-blank';
                span.innerText = word;
                span.onclick = function() { this.classList.add('revealed'); playTTS(word.replace(/[.,'"]/g, "")); };
            }
            container.appendChild(span);
        });
    }

    function updateNavBtns() {
        for(let i=1; i<=5; i++) {
            const btn = document.getElementById(`num-${i}`);
            btn.classList.remove('active');
            if(i === currentIdx + 1) btn.classList.add('active');
        }
    }

    function jumpTo(idx) { currentIdx = idx; render(); }
    function startStep(step) { currentMode = 'STEP' + step; currentIdx = 0; render(); }
    function playTTS(text) { synth.cancel(); const utterance = new SpeechSynthesisUtterance(text); utterance.lang = 'en-US'; utterance.rate = 0.9; synth.speak(utterance); }
    function toggleView(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }
    window.onload = render;
</script>
</body>
</html>
