<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>English Master #31 - 26년 3월 고1</title>
    <style>
        :root { 
            --lavender-light: #F3E5F5; 
            --purple-pale: #E1BEE7; 
            --purple-main: #9575CD; 
            --purple-dark: #673AB7;
            --pink-soft: #FFF0F6;
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: #F8F7FA; display: flex; justify-content: center; min-height: 100vh; }
        .phone-container { width: 100%; max-width: 450px; background: white; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .header { padding: 12px; text-align: center; font-weight: bold; color: var(--purple-dark); border-bottom: 1px solid #eee; background: white; font-size: 0.95rem; position: sticky; top: 0; z-index: 10; }
        #display-area { flex: 1; padding: 20px; display: flex; flex-direction: column; }
        
        .hidden { display: none !important; }
        
        .btn-intro-step { background: var(--purple-main); color: white; padding: 16px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }

        .main-title-card { width: 100%; background: linear-gradient(135deg, #B39DDB 0%, #9575CD 100%); padding: 35px 20px; border-radius: 20px; color: white; margin-bottom: 20px; box-sizing: border-box; text-align: center; }
        .intro-summary { background: var(--lavender-light); padding: 18px; border-radius: 15px; margin-bottom: 15px; border: 2px solid var(--purple-pale); font-size: 0.92rem; line-height: 1.6; color: #444; }
        .intro-topic { background: var(--pink-soft); padding: 18px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #F8BBD0; text-align: center; }
        .topic-kor { font-weight: bold; color: #D81B60; display: block; margin-bottom: 5px; }
        .topic-eng { font-size: 0.85rem; color: #888; font-style: italic; }

        .sentence-box { background: var(--lavender-light); padding: 20px; border-radius: 20px; font-size: 1.1rem; font-weight: 700; color: var(--purple-dark); margin-bottom: 15px; border: 2px solid var(--purple-pale); text-align: center; cursor: pointer; line-height: 1.5; }
        .kor-box { background: #FFF5F7; padding: 20px; border-radius: 20px; font-size: 0.95rem; font-weight: 600; color: #D81B60; margin-bottom: 15px; border: 2px solid #F8BBD0; text-align: center; line-height: 1.6; }
        
        .voca-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .voca-item { background: #fff; padding: 10px; border-radius: 10px; font-size: 0.82rem; border: 1px solid var(--purple-pale); cursor: pointer; text-align: center; font-weight: 600; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; color: #333; }
        .voca-item.revealed { background: var(--purple-main); color: white; }
        
        .blank-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-bottom: 20px; padding: 10px; background: #fdfdfd; border-radius: 15px; }
        .word-blank { border-bottom: 2px solid var(--purple-main); min-width: 35px; text-align: center; font-size: 1rem; color: transparent; cursor: pointer; padding: 0 2px; }
        .word-blank.revealed { color: var(--purple-dark); border-bottom-color: transparent; font-weight: bold; }

        .btn-check { background: #f0f0f0; padding: 12px; border-radius: 12px; border: none; font-weight: bold; margin-bottom: 10px; cursor: pointer; width: 100%; font-size: 0.9rem; color: #555; }
        .trans-content { display: none; padding: 15px; background: #fafafa; border-radius: 15px; border-left: 5px solid var(--purple-main); font-size: 0.9rem; margin-bottom: 10px; color: #444; }
        
        .nav-btns-fixed { display: flex; padding: 15px; background: white; border-top: 1px solid #eee; margin-top: auto; position: sticky; bottom: 0; gap: 10px; align-items: center; }
        .btn-prev { background: #EDF2F7; color: #718096; border-radius: 15px; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; height: 55px; flex: 1; display: flex; align-items: center; justify-content: center; }
        .btn-next { background: var(--purple-main); color: white; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; height: 55px; flex: 1.5; display: flex; align-items: center; justify-content: center; margin-top: 0; }
    </style>
</head>
<body>
<div class="phone-container">
    <div class="header" id="header-title">English Master #31</div>
    <div id="display-area"></div>
    <div id="nav-area" class="nav-btns-fixed hidden">
        <button class="btn-prev" onclick="prevSentence()">PREV</button>
        <button class="btn-next" onclick="nextSentence()" id="main-next-btn">NEXT</button>
    </div>
</div>

<script>
    const prepositions = ["in", "with", "for", "since", "by", "of", "over", "to", "through"];
    const fullData = [
        { en: "Just like how other rooms in your home can cause anxiety when filled with too much stuff, the same is true for kids.", ko: "집의 다른 방들이 너무 많은 물건으로 가득 찼을 때 불안감을 유발할 수 있는 것과 마찬가지로, 아이들에게도 똑같습니다.", voca: ["anxiety:불안", "cause:유발하다", "filled:가득 찬", "stuff:물건", "true:사실인", "home:집", "rooms:방들", "🍎", "🍎", "🍎"] },
        { en: "If the play space houses every single toy that has ever been purchased for them since birth, they may not be able to express their feelings, but they can feel overwhelmed by so much stuff.", ko: "만약 놀이 공간에 태어날 때부터 그들을 위해 구입된 모든 장난감이 들어있다면, 아이들은 자신의 감정을 표현하지 못할 수도 있지만 너무 많은 물건에 압도당할 수 있습니다.", voca: ["purchased:구입된", "birth:탄생", "overwhelmed:압도된", "express:표현하다", "feelings:감정", "houses:수용하다", "single:단 하나의", "🍎", "🍎", "🍎"] },
        { en: "This reminds us of how women look in their closets packed full of clothes and think, I have nothing to wear.", ko: "이것은 여성들이 옷으로 가득 찬 옷장을 보며 '입을 옷이 하나도 없어'라고 생각하는 것을 우리에게 상기시킵니다.", voca: ["reminds:상기시키다", "closets:옷장", "packed:가득 찬", "nothing:아무것도 없음", "wear:입다", "clothes:옷", "🍎", "🍎", "🍎", "🍎"] },
        { en: "Revision helps everyone see what they have and use what they own.", ko: "정돈은 모든 사람이 자신이 무엇을 가지고 있는지 보고 자신이 소유한 것을 사용하는 데 도움을 줍니다.", voca: ["Revision:정돈", "helps:돕다", "own:소유하다", "use:사용하다", "what:것/무엇", "🍎", "🍎", "🍎", "🍎", "🍎"] },
        { en: "When there’s too much to see, too much to step over, and too much input, kids have a hard time making a choice.", ko: "볼 것이 너무 많고, 밟고 지나가야 할 것이 너무 많고, 너무 많은 입력이 있을 때, 아이들은 선택을 내리는 데 어려움을 겪습니다.", voca: ["input:입력/정보", "step over:밟고 넘어가다", "hard time:어려운 시간", "choice:선택", "making:만드는 것", "🍎", "🍎", "🍎", "🍎", "🍎"] },
        { en: "Streamlining a play space is so important.", ko: "놀이 공간을 간소화하는 것이 매우 중요합니다.", voca: ["Streamlining:간소화", "important:중요한", "space:공간", "play:놀이", "🍎", "🍎", "🍎", "🍎", "🍎", "🍎"] },
        { en: "You want your kids to feel inspired and imaginative in the room — not overcome with indecision.", ko: "여러분은 아이들이 방에서 영감을 얻고 상상력이 풍부해지기를 원하지, 우유부단함에 짓눌리기를 원하지 않습니다.", voca: ["inspired:영감을 받은", "imaginative:상상력이 풍부한", "overcome:짓눌린/압도된", "indecision:우유부단함", "want:원하다", "🍎", "🍎", "🍎", "🍎", "🍎"] }
    ];

    let currentMode = 'INTRO';
    let currentIdx = 0;
    const synth = window.speechSynthesis;

    function render() {
        const area = document.getElementById('display-area');
        const nav = document.getElementById('nav-area');
        const header = document.getElementById('header-title');
        area.innerHTML = '';

        if (currentMode === 'INTRO') {
            header.innerText = "English Master #31";
            nav.classList.add('hidden');
            area.innerHTML = `
                <div class="main-title-card"><h1>Streamlining<br>Play Space</h1><p>2026년 3월 고1 31번</p></div>
                <div class="intro-summary">
                    <p>• <b>📍 서론:</b> 집 안의 방들이 물건으로 가득 차면 불안감을 주듯, 아이들의 놀이 공간도 마찬가지임.</p>
                    <p>• <b>📍 본론:</b> 너무 많은 장난감은 아이들을 압도하며 선택을 어렵게 만듦. 옷장이 꽉 차도 입을 게 없다고 느끼는 것과 같음.</p>
                    <p>• <b>📍 결론:</b> 놀이 공간을 간소화(Streamlining)해야 아이들이 상상력을 발휘하고 결정을 더 잘 내릴 수 있음.</p>
                </div>
                <div class="intro-topic">
                    <span class="topic-kor">주제: 아이들의 창의성과 의사결정 능력을 위한 놀이 공간 간소화의 중요성</span>
                    <span class="topic-eng">Topic: The importance of streamlining play spaces for children's creativity and decision-making</span>
                </div>
                <button class="btn-intro-step" onclick="startStep(2)">STEP 2: 문장 학습 시작 ▶</button>
                <button class="btn-intro-step" style="background:#9C27B0;" onclick="startStep(3)">STEP 3: 영작 연습 시작 ▶</button>
            `;
        } else {
            const stepNum = currentMode === 'STEP2' ? 2 : 3;
            header.innerText = `STEP ${stepNum} (${currentIdx + 1}/${fullData.length})`;
            nav.classList.remove('hidden');
            document.getElementById('main-next-btn').innerText = (currentIdx === fullData.length - 1) ? "FINISH" : "NEXT";
            
            const item = fullData[currentIdx];
            if (currentMode === 'STEP2') {
                area.innerHTML = `<div class="sentence-box" onclick="playTTS('${item.en.replace(/'/g, "\\'")}')">${item.en}</div><div class="voca-grid" id="voca-area"></div><button class="btn-check" onclick="toggleView('trans-area')">해석 확인</button><div id="trans-area" class="trans-content">${item.ko}</div>`;
                fillVoca(item.voca, '🍎', "#FF3B30");
            } else {
                area.innerHTML = `<div class="kor-box">${item.ko}</div><div class="blank-area" id="blank-area"></div><div class="voca-grid" id="voca-area"></div><button class="btn-check" onclick="toggleView('trans-area')">정답 확인</button><div id="trans-area" class="trans-content">${item.en}</div>`;
                fillBlanks(item.en);
                fillVoca(item.voca, '🍇', "#9C27B0");
            }
        }
    }

    function fillVoca(vList, emo, col) {
        const area = document.getElementById('voca-area');
        for (let i = 0; i < 10; i++) {
            const div = document.createElement('div');
            div.className = 'voca-item';
            if (vList[i] && vList[i].includes(':')) {
                const [en, ko] = vList[i].split(':');
                div.innerText = en;
                div.onclick = function() { this.classList.toggle('revealed'); this.innerText = this.classList.contains('revealed') ? ko : en; };
            } else {
                div.innerText = emo; div.style.color = col; div.style.cursor = "default";
            }
            area.appendChild(div);
        }
    }

    function fillBlanks(s) {
        const area = document.getElementById('blank-area');
        s.split(' ').forEach(w => {
            const span = document.createElement('span');
            const cw = w.replace(/[.,'"]/g, "").toLowerCase();
            if(prepositions.includes(cw)) { span.innerText = w; span.style.margin="0 4px"; span.style.fontWeight="bold"; }
            else { span.className = 'word-blank'; span.innerText = w; span.onclick = function() { this.classList.add('revealed'); playTTS(w.replace(/[.,'"]/g, "")); }; }
            area.appendChild(span);
        });
    }

    function startStep(s) { currentMode = 'STEP' + s; currentIdx = 0; render(); }
    function nextSentence() { if (currentIdx < fullData.length - 1) { currentIdx++; render(); } else { currentMode = 'INTRO'; render(); } }
    function prevSentence() { if (currentIdx > 0) { currentIdx--; render(); } else { currentMode = 'INTRO'; render(); } }
    function playTTS(t) { synth.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; synth.speak(u); }
    function toggleView(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }
    window.onload = render;
</script>
</body>
</html>
